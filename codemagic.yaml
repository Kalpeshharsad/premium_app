workflows:
  ios-unsigned:
    name: iOS Unsigned (Jailbreak)
    environment:
      flutter: stable
    scripts:
      - name: Build Unsigned IPA
        script: | 
          set -e
          flutter build ios --release --no-codesign \
            --xcargs="CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=''"
          
          # Create Payload and IPA
          rm -rf build/ios/iphoneos/Payload
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r premium_app_unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ios/iphoneos/*.ipa