workflows:
  ios-workflow:
    name: iOS IPA Build (No Code Signing - For TrollStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
    scripts:
      - name: Flutter dependencies
        script: |
          flutter packages pub get
      - name: Patch Xcode Project for Unsigned Build
        script: |
          # Remove hardcoded signing identities and force manual/unsigned style
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Check if patching worked
          grep "CODE_SIGN" ios/Runner.xcodeproj/project.pbxproj
      - name: Build iOS App Bundle (No Code Signing)
        script: |
          flutter build ios --release --no-codesign
      - name: Create Proper IPA for TrollStore
        script: |
          cd $CM_BUILD_DIR/build/ios/iphoneos
          # Create the ipa directory first
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          # Create proper IPA structure: Payload/Runner.app
          rm -rf Payload
          mkdir -p Payload
          cp -R Runner.app Payload/
          # Create the IPA with proper structure
          xcrun zip -r $CM_BUILD_DIR/build/ios/ipa/Runner.ipa Payload
          echo "IPA created at $CM_BUILD_DIR/build/ios/ipa/Runner.ipa"
          ls -la $CM_BUILD_DIR/build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa